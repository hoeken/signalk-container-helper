name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Clean workspace
        run: git clean -xfd

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: |
          if [[ "$REF" == refs/tags/*-beta.* ]] || [[ "$REF" == refs/tags/*-rc.* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
        env:
          # Pass github.ref through env, never interpolated into the shell
          # script — a tag name is attacker-controllable and expanding it
          # inline would be a command-injection vector.
          REF: ${{ github.ref }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

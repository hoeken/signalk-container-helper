version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @types/node major versions track the Node.js major. Pin to the
      # lowest supported runtime (Node 24 per package.json engines) so
      # types reflect what's actually available on every supported version.
      # Allow updates within the v24.x line; ignore v25+.
      - dependency-name: "@types/node"
        versions: [">=25"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch
